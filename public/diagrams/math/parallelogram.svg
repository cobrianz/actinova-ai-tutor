<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Parallelogram -->
  <polygon points="120,220 340,220 280,60 60,60" stroke="#6366f1" stroke-width="2.5" fill="#eef2ff"/>
  <!-- Base label -->
  <line x1="120" y1="240" x2="340" y2="240" stroke="#374151" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="120" y1="236" x2="120" y2="244" stroke="#374151" stroke-width="1.2"/>
  <line x1="340" y1="236" x2="340" y2="244" stroke="#374151" stroke-width="1.2"/>
  <text x="230" y="256" text-anchor="middle" font-family="serif" font-size="18" font-style="italic" fill="#1f2937">b</text>
  <!-- Height line -->
  <line x1="280" y1="60" x2="280" y2="220" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="292" y="145" font-family="serif" font-size="16" font-style="italic" fill="#6366f1">h</text>
