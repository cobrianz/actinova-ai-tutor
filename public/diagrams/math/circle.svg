<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <circle cx="200" cy="150" r="110" stroke="#6366f1" stroke-width="2.5" fill="#eef2ff"/>
  <!-- Center dot -->
  <circle cx="200" cy="150" r="3" fill="#6366f1"/>
  <!-- Radius line -->
  <line x1="200" y1="150" x2="310" y2="150" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="255" y="142" text-anchor="middle" font-family="serif" font-size="18" font-style="italic" fill="#1f2937">r</text>
  <!-- Diameter line -->
  <line x1="90" y1="150" x2="310" y2="150" stroke="#374151" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <!-- Center label -->
  <text x="200" y="170" text-anchor="middle" font-family="serif" font-size="13" fill="#6b7280">O</text>
  <!-- Diameter label -->
  <text x="200" y="210" text-anchor="middle" font-family="serif" font-size="14" fill="#6b7280">d = 2r</text>
</svg>