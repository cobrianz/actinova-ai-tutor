<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Trapezoid -->
  <polygon points="100,220 300,220 260,60 140,60" stroke="#6366f1" stroke-width="2.5" fill="#eef2ff"/>
  <!-- Bottom base (a) -->
  <line x1="100" y1="240" x2="300" y2="240" stroke="#374151" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="100" y1="236" x2="100" y2="244" stroke="#374151" stroke-width="1.2"/>
  <line x1="300" y1="236" x2="300" y2="244" stroke="#374151" stroke-width="1.2"/>
  <text x="200" y="256" text-anchor="middle" font-family="serif" font-size="16" font-style="italic" fill="#1f2937">b₁</text>
  <!-- Top base (a) -->
  <line x1="140" y1="42" x2="260" y2="42" stroke="#374151" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="140" y1="38" x2="140" y2="46" stroke="#374151" stroke-width="1.2"/>
  <line x1="260" y1="38" x2="260" y2="46" stroke="#374151" stroke-width="1.2"/>
  <text x="200" y="37" text-anchor="middle" font-family="serif" font-size="16" font-style="italic" fill="#1f2937">b₂</text>
  <!-- Height -->
  <line x1="100" y1="60" x2="100" y2="220" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="85" y="145" text-anchor="middle" font-family="serif" font-size="16" font-style="italic" fill="#6366f1">h</text>
  <rect x="100" y="205" width="15" height="15" fill="none" stroke="#6366f1" stroke-width="1"/>
</svg>