<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Cone body -->
  <ellipse cx="200" cy="230" rx="100" ry="30" stroke="#6366f1" stroke-width="2.5" fill="#eef2ff"/>
  <line x1="100" y1="230" x2="200" y2="50" stroke="#6366f1" stroke-width="2.5"/>
  <line x1="300" y1="230" x2="200" y2="50" stroke="#6366f1" stroke-width="2.5"/>
  <!-- Radius line -->
  <line x1="200" y1="230" x2="300" y2="230" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="250" y="225" text-anchor="middle" font-family="serif" font-size="16" font-style="italic" fill="#1f2937">r</text>
  <!-- Height line -->
  <line x1="200" y1="50" x2="200" y2="230" stroke="#374151" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="215" y="145" font-family="serif" font-size="16" font-style="italic" fill="#374151">h</text>
  <!-- Slant height -->
  <text x="140" y="135" text-anchor="middle" font-family="serif" font-size="14" font-style="italic" fill="#6366f1">l</text>
  <!-- Apex label -->
  <text x="200" y="42" text-anchor="middle" font-family="serif" font-size="13" fill="#6b7280">apex</text>
</svg>