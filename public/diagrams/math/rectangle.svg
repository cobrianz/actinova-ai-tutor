<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <rect x="60" y="60" width="280" height="160" rx="2" stroke="#6366f1" stroke-width="2.5" fill="#eef2ff"/>
